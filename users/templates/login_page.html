{% extends "master.html" %}
  
{% block title %}Moosaver登入{% endblock %}

{% block content %}
    <div id="app">
        <div class="login-container">
            <div class="login-header">
                <h1>Moosaver</h1>
                <p>請登入您的帳號</p>
            </div>
            <form @submit.prevent="login">
                <div class="form-group">
                    <label for="username">用戶名</label>
                    <input 
                        type="text" 
                        id="username" 
                        v-model="username" 
                        required
                        @blur="validateUsername"
                    >
                    <p class="error-message" v-if="errors.username">[[ errors.username ]]</p>
                </div>
                
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input 
                        type="password" 
                        id="password" 
                        v-model="password"
                        required
                        @blur="validatePassword"
                    >
                    <p class="error-message" v-if="errors.password">[[ errors.password ]]</p>
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="remember-me" v-model="rememberMe">
                    <label for="remember-me">記住我</label>
                </div>
                
                <!-- 修改按鈕文字顯示方式 -->
                <button type="submit" class="login-button" :disabled="isLoading">
                    <span v-if="isLoading">登入中...</span>
                    <span v-else>登入</span>
                </button>
                
                <p class="error-message" v-if="errors.login">[[ errors.login ]]</p>
                
                <div class="signup-link">
                    還沒有帳號？ <a href="/users/register/">立即註冊</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // 確保 DOM 完全加載後再初始化 Vue
        document.addEventListener('DOMContentLoaded', function() {
            var app = new Vue({
                el: '#app',
                delimiters: ['[[', ']]'],
                data: {
                    username: '',
                    password: '',
                    rememberMe: false,
                    isLoading: false,
                    errors: {
                        username: '',
                        password: '',
                        login: ''
                    }
                },
                // 改寫計算屬性的語法以提高兼容性
                computed: {
                    loginButtonText: function() {
                        return this.isLoading ? '登入中...' : '登入';
                    }
                },
                methods: {
                    validateUsername: function() {
                        if (this.username.length < 3) {
                            this.errors.username = '用戶名必須至少包含3個字符';
                        } else {
                            this.errors.username = '';
                        }
                    },
                    validatePassword: function() {
                        if (this.password.length < 6) {
                            this.errors.password = '密碼必須至少包含6個字符';
                        } else {
                            this.errors.password = '';
                        }
                    },
                    login: function() {
                        // 驗證所有欄位
                        this.validateUsername();
                        this.validatePassword();
                        
                        // 檢查是否有錯誤
                        if (this.errors.username || this.errors.password) {
                            return;
                        }
                        
                        // 模擬登入請求
                        this.isLoading = true;
                        this.errors.login = '';
                        
                        // 在實際應用中，這裡應該發送API請求到後端進行身份驗證
                        setTimeout(() => {
                            // 模擬API回應
                            this.isLoading = false;
                            
                            // 模擬登入成功
                            alert('登入成功！');
                            console.log('用戶登入資料:', {
                                username: this.username,
                                password: this.password,
                                rememberMe: this.rememberMe
                            });
                        }, 1500);
                    }
                }
            });
            
            // 檢查 Vue 是否正確初始化
            console.log('Vue 實例初始化完成');
        });
    </script>
</body>

{% endblock %}
